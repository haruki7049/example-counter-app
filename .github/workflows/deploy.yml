name: Build and deploy Cloudflare Pages

on:
  push:
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31.6.0
      - name: dx bundle
        run: |
          nix-shell --run 'dx bundle'

      - name: Archive artifact
        run: |
          echo ::group::Archive artifact
          tar \
            --dereference --hard-dereference \
            --directory "./target/dx/example-counter-app/debug/web/public" \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
          echo ::endgroup::

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cloudflare-pages
          path: ${{ runner.temp }}/artifact.tar
          include-hidden-files: true

  deploy:
    needs: build
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: cloudflare-pages
          path: ./dist
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --project-name=example-counter-app
