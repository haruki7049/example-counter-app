name: Build and deploy Cloudflare Pages

on:
  push:
    branches:
      - 'main'

jobs:
  deploy:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31.6.0
      - name: dx bundle
        run: |
          nix-shell --run 'dx bundle --release'

      - name: Deploy to Cloudflare Pages
        run: nix-shell --run "wrangler pages deploy ./target/dx/example-counter-app/release/web/public --project-name=example-counter-app"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
